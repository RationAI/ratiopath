site_name: RatioPath
repo_url: https://github.com/RationAI/ratiopath

nav:
  - Home: index.md
  - Learn:
      - GET STARTED:
          - Quick Start:
              - learn/get-started/quick-start/index.md
              - learn/get-started/quick-start/tiling.md
              - learn/get-started/quick-start/annotations.md
              - learn/get-started/quick-start/overlays.md
              - learn/get-started/quick-start/tiled-dataset.md
          - learn/get-started/installation.md
  - Examples:
      - Overview: examples/index.md
      - Basic Functionalities:
          - Read Slides And Choose Resolution: examples/basic-functionalities/slide-metadata-and-resolution.md
          - Inspect Slides And Preview Tiles: examples/basic-functionalities/inspect-slides-and-preview-tiles.md
          - Generate Tile Coordinates: examples/basic-functionalities/tile-grid-generation.md
          - Extract Tiles Locally Without Ray: examples/basic-functionalities/extract-tiles-locally-without-ray.md
          - Add Annotation And Overlay Signals: examples/basic-functionalities/annotation-and-overlay-enrichment.md
          - Split Data With Groups: examples/basic-functionalities/group-aware-splitting.md
          - Generate A Tissue Mask Overlay: examples/basic-functionalities/tissue-mask-generation.md
          - Aggregate Tensor Columns In Ray: examples/basic-functionalities/tensor-aggregations.md
          - Apply Stain Augmentation: examples/basic-functionalities/stain-augmentation.md
          - Write TIFF Outputs From Ray: examples/basic-functionalities/write-tiff-outputs-from-ray.md
      - Pipelines:
          - Build A Distributed Tiling Pipeline: examples/pipelines/distributed-tiling-pipeline.md
          - Create An Annotation-Aware Tile Dataset: examples/pipelines/annotation-aware-dataset-pipeline.md
          - Build A Mask-First Tile Filtering Pipeline: examples/pipelines/mask-first-tile-filtering-pipeline.md
          - Prepare A Training Dataset With Leakage-Safe Splits: examples/pipelines/prepare-a-training-dataset-with-leakage-safe-splits.md
  - Reference:
      - Tiling:
          - annotations: reference/tiling/annotations.md
          - overlays: reference/tiling/overlays.md
          - read_slide_tile: reference/tiling/read_slide_tile.md
          - tilers: reference/tiling/tilers.md
          - utils: reference/tiling/utils.md
      - Parsers:
          - ASAPParser: reference/parsers/asap.md
          - Darwin7JSONParser: reference/parsers/darwin.md
          - GeoJSONParser: reference/parsers/geojson.md
      - Augmentations:
          - estimate_stain_vectors: reference/augmentations/estimate_stain_vectors.md
          - StainAugmentor: reference/augmentations/stain_augmentor.md
      - Ray:
          - Aggregations:
              - tensor_mean: reference/ray/aggregations/tensor_mean.md
              - tensor_std: reference/ray/aggregations/tensor_std.md
          - read_slides: reference/ray/read_slides.md
          - VipsTiffDatasink: reference/ray/vips_tiff_datasink.md
      - OpenSlide: reference/openslide.md

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  features:
    - announce.dismiss
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.tooltips
    - navigation.indexes
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.footer
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/link
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/toggle-switch-off
        name: Switch to system preference

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_if_no_docstring: true

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - attr_list
  - md_in_html
  - pymdownx.blocks.caption

extra:
  version:
    provider: mike
